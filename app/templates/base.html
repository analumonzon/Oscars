<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="Yrz0cdIt8GKRYa4Yz_3zFFwvBsNe8FV4702-2hbcbjY" />
  <title>Oscars 2026</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">Oscars 2026 at Ray's</div>
    <nav class="nav-links">
      <a href="/" class="nav-link {% block nav_ballot_active %}{% endblock %}">Ballot</a>
      <a href="/view" class="nav-link {% block nav_view_active %}{% endblock %}">My Ballot</a>
      <a href="/leaderboard" class="nav-link {% block nav_leaderboard_active %}{% endblock %}">Leaderboard</a>
      <a href="/admin" class="nav-link {% block nav_admin_active %}{% endblock %}">Admin</a>
    </nav>
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var key = params.get('key');
      if (key) {
        sessionStorage.setItem('adminKey', key);
      } else {
        key = sessionStorage.getItem('adminKey');
      }
      if (!key) return;

      // Fix nav links to /admin
      document.querySelectorAll('a[href="/admin"]').forEach(function(a) {
        a.href = '/admin?key=' + encodeURIComponent(key);
      });

      // Fix form actions that post to /admin/*
      document.querySelectorAll('form[action^="/admin"]').forEach(function(f) {
        var url = new URL(f.action, window.location.origin);
        url.searchParams.set('key', key);
        f.action = url.pathname + url.search;
      });
    })();
  </script>
</body>
</html>
